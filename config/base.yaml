# Base configuration — shared across all courses
# Per-course configs override or extend these values

ingestion:
  mode: file        # change to "api" when Thinkific API access is available
  api_key: ""       # populate when API access is granted
  api_base_url: ""  # populate when API access is granted

paths:
  raw_data: data/raw
  processed_data: data/processed
  reports: reports
  duckdb: data/academy.duckdb

# Files present in every course folder
common_files:
  progress: "progress_*.csv"
  user_export: "user_export_*.csv"

join_key: email

# All known variations of the email column name across Thinkific exports
email_columns:
  - email
  - Email
  - Email Address
  - Student Email

output:
  date_format: "%Y-%m-%d"
  duckdb_table_prefix: "course_"

# --- SHARED CLEANING RULES ---

gender:
  valid_values:
    - Male
    - Female
    - Other
    - Prefer not to say
  mappings:
    male: Male
    m: Male
    "1": Male
    female: Female
    f: Female
    "2": Female
    other: Other
    prefer not to say: Prefer not to say

age_bins:
  labels:
    - Below 18
    - 18-24
    - 25-35
    - 36+
    - Not Assigned
  mappings:
    below 18 years: Below 18
    18-24 years: 18-24
    between 18 to 24: 18-24
    "18 to 24": 18-24
    25-35 years: 25-35
    between 25 to 35: 25-35
    "25 to 35": 25-35
    between 36 to 45: 36+
    above 45: 36+
    36+ years: 36+
    "36 to 45": 36+
    above 45 years: 36+
    not assigned: Not Assigned
    "": Not Assigned

